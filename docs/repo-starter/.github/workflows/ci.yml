name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  NODE_ENV: test

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
        env:
          # Use a throwaway test DB; real secrets stay out of CI logs
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/roomwell_test
          TOKEN_SIGNING_SECRET: ${{ secrets.TOKEN_SIGNING_SECRET_TEST }}
          ICAL_FEED_SIGNING_SECRET: ${{ secrets.ICAL_FEED_SIGNING_SECRET_TEST }}

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_APP_URL: https://app.roomwell.com
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  migration-check:
    name: Drizzle migration check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: roomwell_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/roomwell_test

      - name: Verify no schema drift
        run: |
          pnpm db:generate --dry-run
          # Fail if running `drizzle-kit generate` would produce new SQL,
          # which means the schema and migration files are out of sync.
